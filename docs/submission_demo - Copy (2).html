<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Submission Demo — Multi-Agent PM System · Use Case 1</title>
<style>
:root{
  --bg:#060b18;--dark:#0b1120;--surface:#111827;--card:#1e293b;
  --border:#1e3050;--text:#f0f4ff;--muted:#7c93b8;
  --accent:#2563eb;--green:#22c55e;--yellow:#facc15;
  --red:#f87171;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:Inter,system-ui,-apple-system,sans-serif;}

/* ── HUD bar ── */
.hud{position:fixed;top:0;left:0;right:0;height:44px;z-index:100;
  background:rgba(6,11,24,.92);border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);display:flex;align-items:center;gap:14px;padding:0 18px;}
.hud-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;white-space:nowrap;}
.hud-badge{font-size:10px;font-weight:800;padding:2px 10px;border-radius:999px;
  background:rgba(37,99,235,.3);border:1px solid #2563eb;color:#93c5fd;white-space:nowrap;}
.hud-section{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;
  background:var(--accent);color:#fff;transition:background .3s;}
.hud-timer{font-size:18px;font-weight:700;font-family:'Courier New',monospace;
  color:var(--yellow);min-width:52px;}
.hud-timer.running{color:var(--green);}
.hud-prog{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.hud-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));
  border-radius:2px;transition:width .6s;}
.hud-count{font-size:11px;color:var(--muted);white-space:nowrap;}
.hud-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;
  border:none;transition:opacity .15s;}
.hud-btn:disabled{opacity:.3;cursor:default;}
.btn-play{background:var(--green);color:#052e16;}
.btn-pause{background:var(--yellow);color:#1c1917;}
.btn-stop{background:var(--red);color:#fff;}
.btn-nav{background:var(--card);color:var(--text);border:1px solid var(--border);}

/* ── Main stage ── */
.stage{position:fixed;top:44px;bottom:44px;left:0;right:0;display:flex;}
.visual-panel{flex:0 0 68%;position:relative;background:var(--dark);
  border-right:2px solid var(--border);overflow:hidden;}
.visual-panel>iframe{width:100%;height:100%;border:none;display:block;background:#fff;}
.visual-label{position:absolute;top:10px;left:10px;z-index:10;
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;
  background:rgba(6,11,24,.85);color:var(--purple);border:1px solid var(--purple);
  letter-spacing:.06em;backdrop-filter:blur(4px);}
.visual-text{width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:32px;gap:16px;}

/* ── Narration panel ── */
.narr-panel{flex:1;display:flex;flex-direction:column;background:var(--dark);overflow:hidden;}
.slide-section-tag{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;padding:10px 24px 0;color:var(--muted);}
.slide-title{font-size:19px;font-weight:800;padding:8px 24px 0;line-height:1.2;color:var(--text);}
.slide-body{flex:1;overflow-y:auto;padding:14px 24px;font-size:13px;line-height:1.8;color:#c8d8f0;}
.slide-body p{margin-bottom:12px;}
.slide-body .highlight{color:var(--yellow);font-weight:700;}
.slide-body .agent{display:inline-block;padding:1px 7px;border-radius:4px;
  font-size:12px;font-weight:700;margin:0 2px;}
.agent-pm   {background:rgba(37,99,235,.25);color:#93c5fd;}
.agent-risk {background:rgba(251,146,60,.2); color:#fed7aa;}
.agent-qa   {background:rgba(167,139,250,.2);color:#ddd6fe;}
.agent-eng  {background:rgba(34,197,94,.2);  color:#bbf7d0;}
.agent-stake{background:rgba(244,114,182,.2);color:#fbcfe8;}
.narr-footer{padding:10px 24px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.wave-row{display:flex;align-items:flex-end;gap:3px;height:20px;margin-bottom:6px;}
.wb{width:3px;border-radius:2px;background:var(--accent);height:3px;}
.speaking .wb{animation:wav .65s ease-in-out infinite alternate;}
.wb:nth-child(1){animation-delay:0s;} .wb:nth-child(2){animation-delay:.1s;}
.wb:nth-child(3){animation-delay:.2s;} .wb:nth-child(4){animation-delay:.3s;}
.wb:nth-child(5){animation-delay:.15s;} .wb:nth-child(6){animation-delay:.05s;}
@keyframes wav{from{height:3px;}to{height:18px;}}
.voice-status{font-size:11px;color:var(--muted);}
.voice-row{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.voice-row select{background:var(--card);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:3px 7px;font-size:11px;flex:1;}
.speed-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.speed-row input{width:70px;accent-color:var(--accent);}

/* ── Bottom dot nav ── */
.dots{position:fixed;bottom:0;left:0;right:0;height:44px;z-index:100;
  background:rgba(6,11,24,.92);border-top:1px solid var(--border);
  backdrop-filter:blur(8px);display:flex;align-items:center;
  justify-content:center;gap:6px;padding:0 80px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;
  transition:all .2s;flex-shrink:0;}
.dot:hover{background:var(--muted);}
.dot.active{background:var(--accent);transform:scale(1.4);}
.dot.done{background:var(--purple);opacity:.6;}

/* ── Title visual ── */
.title-visual{background:linear-gradient(135deg,#060b18 0%,#0d1f3c 50%,#060b18 100%);
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px;position:relative;overflow:hidden;}
.title-visual::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 40%,rgba(37,99,235,.2),transparent 65%);}
.uc-badge{background:rgba(37,99,235,.3);border:2px solid #2563eb;border-radius:999px;
  padding:5px 20px;font-size:12px;font-weight:800;color:#93c5fd;letter-spacing:.08em;
  margin-bottom:14px;position:relative;}
.title-logo{font-size:50px;margin-bottom:12px;position:relative;}
.title-sys{font-size:26px;font-weight:800;color:var(--text);text-align:center;
  line-height:1.2;position:relative;}
.title-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;
  letter-spacing:.04em;position:relative;}
.agent-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-top:20px;position:relative;}
.agent-pill{font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid;}

/* ── Problem visual ── */
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:520px;}
.prob-card{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);
  border-radius:10px;padding:14px 16px;}
.prob-icon{font-size:22px;margin-bottom:5px;}
.prob-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px;}
.prob-text{font-size:11px;color:var(--muted);line-height:1.5;}
.sol-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);
  border-radius:10px;padding:14px 16px;grid-column:span 2;}

/* ── Architecture full diagram ── */
.arch-full{display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 20px;height:100%;background:linear-gradient(135deg,#06111f,#0b1a30);
  overflow-y:auto;}
.af-row{display:flex;align-items:center;gap:8px;justify-content:center;width:100%;}
.af-box{border-radius:8px;border:2px solid;padding:7px 12px;text-align:center;
  font-size:10px;font-weight:700;line-height:1.35;}
.af-arrow-h{font-size:14px;color:var(--muted);flex-shrink:0;}
.af-arrow-v{font-size:16px;color:var(--muted);text-align:center;}
.af-api{background:rgba(37,99,235,.15);border-color:#2563eb;color:#93c5fd;}
.af-graph{background:rgba(37,99,235,.1);border-color:#3b82f6;color:#bfdbfe;}
.af-memory{width:100%;border:2px dashed #7c3aed;border-radius:10px;padding:9px 16px;
  background:rgba(124,58,237,.08);color:#c4b5fd;font-size:10px;font-weight:700;text-align:center;}
.af-mem-keys{font-size:9px;font-weight:400;color:#a78bfa;margin-top:3px;letter-spacing:.02em;}
.af-agents{display:flex;gap:5px;width:100%;justify-content:center;}
.af-agent{border-radius:8px;border:2px solid;padding:8px 8px;text-align:center;
  font-size:10px;font-weight:700;flex:1;min-width:65px;line-height:1.4;}
.af-pm{background:rgba(37,99,235,.2);border-color:#2563eb;color:#93c5fd;}
.af-risk{background:rgba(251,146,60,.15);border-color:#fb923c;color:#fed7aa;}
.af-stake{background:rgba(244,114,182,.15);border-color:#f472b6;color:#fbcfe8;}
.af-eng{background:rgba(34,197,94,.15);border-color:#22c55e;color:#bbf7d0;}
.af-qa{background:rgba(167,139,250,.2);border-color:#a78bfa;color:#ddd6fe;}
.af-edges{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;width:100%;}
.af-edge{font-size:9px;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid;white-space:nowrap;}
.af-edge-red{background:rgba(248,113,113,.15);border-color:#f87171;color:#f87171;}
.af-edge-purple{background:rgba(167,139,250,.15);border-color:#a78bfa;color:#a78bfa;}
.af-edge-pink{background:rgba(244,114,182,.15);border-color:#f472b6;color:#f472b6;}
.af-edge-orange{background:rgba(251,146,60,.15);border-color:#fb923c;color:#fed7aa;}
.af-compass{background:rgba(34,211,238,.1);border-color:#22d3ee;color:#67e8f9;}
.af-logs{background:rgba(250,204,21,.1);border-color:#facc15;color:#fde68a;}
.af-divider{width:100%;height:1px;background:var(--border);opacity:.4;}

/* ── Compass config visual ── */
.compass-visual{width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;gap:18px;
  background:linear-gradient(135deg,#06111f,#0b1a30);}
.env-block{width:100%;max-width:500px;background:rgba(0,0,0,.45);
  border:1px solid #1e3050;border-radius:10px;padding:16px 20px;font-family:'Courier New',monospace;}
.env-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:10px;}
.env-line{font-size:12px;margin-bottom:7px;line-height:1.5;}
.env-key{color:#93c5fd;}
.env-eq{color:#7c93b8;}
.env-val{color:#86efac;}
.env-comment{color:#4b5563;font-size:10px;}
.compass-models{display:flex;gap:12px;width:100%;max-width:500px;}
.cm-card{flex:1;border-radius:10px;padding:14px 16px;text-align:center;}
.cm-card-r{background:rgba(34,211,238,.08);border:2px solid #22d3ee;}
.cm-card-s{background:rgba(34,197,94,.08);border:2px solid #22c55e;}
.cm-model-name{font-size:16px;font-weight:800;color:var(--text);}
.cm-use{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.6;}
.compass-note{font-size:10px;color:var(--muted);text-align:center;max-width:460px;
  padding:10px 14px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.2);
  border-radius:8px;}

/* ── JSONL Trace visual ── */
.trace-visual{width:100%;height:100%;display:flex;flex-direction:column;
  gap:7px;padding:16px 20px;overflow-y:auto;
  background:linear-gradient(135deg,#06111f,#0b1a30);}
.trace-header{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:2px;}
.trace-entry{background:rgba(0,0,0,.35);border-radius:8px;padding:9px 12px;
  border-left:4px solid;font-family:'Courier New',monospace;font-size:10px;}
.te-escalated{border-color:#fb923c;}
.te-branch{border-color:#f87171;}
.te-replan{border-color:#2563eb;}
.te-reject{border-color:#a78bfa;}
.te-revise{border-color:#22c55e;}
.te-approve{border-color:#22d3ee;}
.trace-agent{font-size:9px;font-weight:700;display:inline-block;padding:1px 7px;
  border-radius:4px;margin-bottom:3px;}
.ta-risk{background:rgba(251,146,60,.25);color:#fed7aa;}
.ta-orch{background:rgba(37,99,235,.25);color:#93c5fd;}
.ta-pm{background:rgba(37,99,235,.25);color:#93c5fd;}
.ta-qa{background:rgba(167,139,250,.25);color:#ddd6fe;}
.ta-eng{background:rgba(34,197,94,.25);color:#bbf7d0;}
.ta-stake{background:rgba(244,114,182,.25);color:#fbcfe8;}
.trace-action{font-weight:700;color:var(--text);margin-left:5px;font-size:9px;}
.trace-out{color:#9ca3af;margin-top:3px;line-height:1.5;font-size:9px;}
.trace-meta{margin-top:3px;font-size:9px;color:#6b7280;}
.ts-escalated{color:#fb923c;font-weight:700;}
.ts-reject{color:#a78bfa;font-weight:700;}
.ts-success{color:#22c55e;font-weight:700;}
.ts-branch{color:#f87171;font-weight:700;}

/* ── Live demo split panel ── */
.live-split{display:flex;width:100%;height:100%;}

.lc-ui{flex:0 0 56%;position:relative;border-right:2px solid var(--border);overflow:hidden;
  display:flex;flex-direction:column;}
.lc-ui-bar{padding:5px 10px;background:rgba(0,0,0,.5);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lc-ui-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.lc-ui-dot.offline{background:var(--red);}
.lc-ui-url{font-size:10px;font-weight:700;color:var(--muted);font-family:'Courier New',monospace;}
.lc-ui-tag{font-size:9px;padding:2px 8px;border-radius:999px;border:1px solid;font-weight:700;}
.lc-ui-tag.live{background:rgba(34,197,94,.15);border-color:#22c55e;color:#86efac;}
.lc-ui-tag.offline{background:rgba(248,113,113,.15);border-color:#f87171;color:#fca5a5;}
.lc-ui iframe{flex:1;border:none;background:#1e293b;min-height:0;}
.lc-offline{position:absolute;inset:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;z-index:5;}
.lc-offline-icon{font-size:32px;}
.lc-offline-title{font-size:14px;font-weight:800;color:var(--text);text-align:center;}
.lc-offline-cmd{font-family:'Courier New',monospace;font-size:12px;font-weight:700;
  padding:8px 16px;background:rgba(0,0,0,.6);border:1px solid var(--green);
  border-radius:6px;color:var(--green);}
.lc-offline-hint{font-size:10px;color:var(--muted);text-align:center;max-width:230px;line-height:1.6;}

.lc-trace{flex:1;display:flex;flex-direction:column;background:var(--dark);overflow:hidden;min-width:0;}
.lc-trace-hdr{padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.lc-trace-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;white-space:nowrap;}
.lc-run-btn{padding:5px 12px;border-radius:6px;background:var(--green);color:#052e16;
  font-size:10px;font-weight:800;border:none;cursor:pointer;white-space:nowrap;
  transition:opacity .15s;}
.lc-run-btn:disabled{opacity:.4;cursor:default;}
.lc-scroll{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:5px;min-height:0;}
.lc-empty{padding:16px;color:#374151;font-size:10px;text-align:center;
  font-family:'Courier New',monospace;line-height:1.6;}
.lc-entry{border-radius:6px;padding:7px 10px;border-left:3px solid;
  font-family:'Courier New',monospace;font-size:9px;
  animation:lcFadeIn .35s ease;flex-shrink:0;}
@keyframes lcFadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.lce-pm    {border-color:#2563eb;background:rgba(37,99,235,.07);}
.lce-risk  {border-color:#fb923c;background:rgba(251,146,60,.07);}
.lce-stake {border-color:#f472b6;background:rgba(244,114,182,.07);}
.lce-eng   {border-color:#22c55e;background:rgba(34,197,94,.07);}
.lce-qa    {border-color:#a78bfa;background:rgba(167,139,250,.07);}
.lce-orch  {border-color:#3b82f6;background:rgba(59,130,246,.05);}
.lce-hdr{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.lce-content{color:#c8d8f0;line-height:1.45;word-break:break-word;}
.lce-status{margin-top:3px;font-size:8px;font-weight:700;}
.lc-status-bar{padding:5px 12px;border-top:1px solid var(--border);
  font-size:9px;color:var(--muted);flex-shrink:0;display:flex;align-items:center;gap:6px;
  white-space:nowrap;overflow:hidden;}
.lc-pulse{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.lc-pulse.live{background:var(--green);animation:lc-pulse 1s infinite;}
@keyframes lc-pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── Evidence visual ── */
.ev-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:500px;}
.ev-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  border-radius:9px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.2);}
.ev-num{width:28px;height:28px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;}
.ev-text{font-size:12px;line-height:1.6;color:#c8d8f0;}
.ev-text strong{color:var(--yellow);}

/* ── Closing visual ── */
.closing-visual{background:linear-gradient(135deg,#06111f,#0b1a30);
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px;text-align:center;gap:14px;}
.closing-tag{font-size:11px;color:var(--green);font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.closing-title{font-size:28px;font-weight:800;line-height:1.15;}
.closing-metrics{display:flex;gap:20px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.cm{text-align:center;}
.cm-num{font-size:26px;font-weight:800;color:var(--accent);}
.cm-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.closing-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.closing-chip{font-size:10px;padding:3px 10px;border-radius:999px;
  background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.3);color:#93c5fd;}
</style>
</head>
<body>

<!-- ── HUD ── -->
<div class="hud">
  <div class="hud-title">Multi-Agent Office &amp; Team Simulation</div>
  <div class="hud-badge">USE CASE ID: 1</div>
  <div class="hud-section" id="hudSection">Intro</div>
  <div class="hud-timer" id="hudTimer">0:00</div>
  <div class="hud-prog"><div class="hud-fill" id="hudFill" style="width:0%"></div></div>
  <div class="hud-count" id="hudCount">1 / 12</div>
  <button class="hud-btn btn-play"  id="btnPlay"  onclick="play()">▶ Play</button>
  <button class="hud-btn btn-pause" id="btnPause" onclick="pause()"  disabled>⏸</button>
  <button class="hud-btn btn-stop"  id="btnStop"  onclick="stopAll()" disabled>⏹</button>
  <button class="hud-btn btn-nav"   onclick="go(cur-1)">◀</button>
  <button class="hud-btn btn-nav"   onclick="go(cur+1)">▶</button>
</div>

<!-- ── Stage ── -->
<div class="stage">
  <div class="visual-panel" id="visualPanel">
    <div class="visual-label" id="visualLabel"></div>
  </div>
  <div class="narr-panel">
    <div class="slide-section-tag" id="slideTag"></div>
    <div class="slide-title" id="slideTitle"></div>
    <div class="slide-body" id="slideBody"></div>
    <div class="narr-footer">
      <div class="wave-row" id="waveEl">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      </div>
      <div class="voice-status" id="voiceStatus">Ready — click ▶ Play</div>
      <div class="voice-row"><select id="voiceSel"></select></div>
      <div class="speed-row" style="margin-top:6px;">
        Speed <input type="range" id="spdSlider" min=".6" max="1.3" step=".05" value=".88"
          oninput="rate=+this.value;document.getElementById('spdVal').textContent=rate.toFixed(2)+'×'">
        <span id="spdVal">0.88×</span>
      </div>
    </div>
  </div>

async function lcCheckServer() {
  // Use no-cors so this works from both file:// and http:// origins.
  // A successful no-cors fetch (opaque response) means the server is up;
  // a TypeError/AbortError means it is unreachable.
  return new Promise(resolve => {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => { ctrl.abort(); resolve(false); }, 2500);
    fetch('http://localhost:8000/', { mode: 'no-cors', signal: ctrl.signal })
      .then(() => { clearTimeout(timer); resolve(true);  })
      .catch(() => { clearTimeout(timer); resolve(false); });
  });
}

function lcSetStatus(msg, live=false) {
  const el = document.getElementById('liveStatus');
  const dot = document.getElementById('liveDot');
  if (el)  el.textContent = msg;
  if (dot) dot.className  = 'lc-pulse' + (live ? ' live' : '');
}

function lcSetUiTag(online) {
  const tag = document.getElementById('lcUiTag');
  const dot = document.getElementById('lcUiDot');
  if (!tag) return;
  if (online) {
    tag.textContent = 'LIVE'; tag.className = 'lc-ui-tag live';
    if (dot) dot.className = 'lc-ui-dot';
  } else {
    tag.textContent = 'OFFLINE'; tag.className = 'lc-ui-tag offline';
    if (dot) dot.className = 'lc-ui-dot offline';
  }
}

function lcAppend(data) {
  const container = document.getElementById('liveTrace');
  if (!container) return;
  const empty = container.querySelector('.lc-empty');
  if (empty) empty.remove();

  const raw   = (data.agent_name || data.sender || 'system').toLowerCase().replace(/[\s-]/g,'_');
  const style = AGENT_MAP[raw] || AGENT_MAP.orchestrator;
  const content = (data.output_summary || data.content || data.message || '').trim();
  const action  = data.action || '';
  const status  = data.status || data.metadata?.status || '';
  const scol    = STATUS_COL[status] || '#6b7280';

  const div = document.createElement('div');
  div.className = `lc-entry ${style.cls}`;
  div.innerHTML =
    `<div class="lce-hdr">` +
      `<span class="trace-agent ${style.tc}">${style.label}</span>` +
      (action ? `<span style="color:#6b7280;font-size:8px;">${action}</span>` : '') +
    `</div>` +
    `<div class="lce-content">${content.substring(0,160)}${content.length>160?'…':''}</div>` +
    (status ? `<div class="lce-status" style="color:${scol};">${status}</div>` : '');

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function lcStartPolling(projectId) {
  if (_liveTimer) clearInterval(_liveTimer);
  _liveSeenCount = 0;
  _liveTimer = setInterval(async () => {
    try {
      const r = await fetch(`http://localhost:8000/interactions/${projectId}`,
        { signal: AbortSignal.timeout(3000) });
      if (!r.ok) return;
      const d = await r.json();
      const msgs = d.interactions || d.messages || [];
      if (msgs.length > _liveSeenCount) {
        msgs.slice(_liveSeenCount).forEach(lcAppend);
        _liveSeenCount = msgs.length;
      }
      const st = (d.status || '').toUpperCase();
      if (st === 'COMPLETED' || st === 'FAILED') {
        clearInterval(_liveTimer); _liveTimer = null; _liveRunning = false;
        lcSetStatus(`✅ Simulation complete — ${msgs.length} interactions`, false);
        const btn = document.getElementById('lcRunBtn');
        if (btn) { btn.disabled = false; btn.textContent = '▶ Run Again'; }
      }
    } catch {}
  }, 1200);
}

function lcRunDemoAnimation() {
  DEMO_SCRIPT.forEach(entry => {
    setTimeout(() => {
      lcAppend(entry);
      if (entry.status === 'completed') {
        lcSetStatus(`✅ Demo complete — ${DEMO_SCRIPT.length} interactions`, false);
        const btn = document.getElementById('lcRunBtn');
        if (btn) { btn.disabled = false; btn.textContent = '▶ Run Again'; }
      }
    }, entry.delay);
  });
}

async function lcTriggerRun() {
  const btn = document.getElementById('lcRunBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting…'; }
  lcSetStatus('Sending POST /run to localhost:8000…', false);

  const payload = {
    project_id: 'demo_' + Date.now(),
    project_name: 'Visitor Management System',
    description: 'Build a web-based visitor management system for corporate offices: digital check-in kiosks, visitor badge printing, host notifications, compliance-ready audit logging with GDPR retention controls.'
  };

  try {
    const r = await fetch('http://localhost:8000/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(6000)
    });
    if (r.ok) {
      const d = await r.json();
      const pid = d.project_id || payload.project_id;
      _liveRunning = true;
      lcSetStatus('Simulation running…', true);
      if (btn) { btn.textContent = '⏹ Running…'; }
      lcStartPolling(pid);
      return;
    }
  } catch {}

  // Server online but run failed — try run-sync
  try {
    const r2 = await fetch('http://localhost:8000/run-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, project_id: 'demo2_' + Date.now() }),
      signal: AbortSignal.timeout(8000)
    });
    if (r2.ok) {
      const d2 = await r2.json();
      const msgs = d2.interactions || d2.messages || [];
      msgs.forEach((m, i) => setTimeout(() => lcAppend(m), i * 180));
      setTimeout(() => {
        lcSetStatus(`✅ Run complete — ${msgs.length} interactions`, false);
        if (btn) { btn.disabled = false; btn.textContent = '▶ Run Again'; }
      }, msgs.length * 180 + 400);
      return;
    }
  } catch {}

  // Fall back to demo animation
  lcSetStatus('Running demo sequence…', true);
  if (btn) { btn.textContent = '▶ Demo'; }
  lcRunDemoAnimation();
}

// Called when the live-platform slide is first rendered
async function lcInitSlide() {
  const offEl = document.getElementById('lcOffline');
  const ifr   = document.getElementById('lcIframe');

  // Load the iframe immediately — don't wait for the server check.
  // If the server is up it will display; if not the offline overlay stays on top.
  if (ifr) ifr.src = 'http://localhost:8000/';

  // Determine the best URL hint: when served from localhost:8000 the iframe
  // is same-origin and will definitely work; from file:// it depends on CORS.
  const servedFromServer = location.protocol === 'http:' && location.hostname === 'localhost';

  if (servedFromServer) {
    // Same-origin — guaranteed to work
    if (offEl) offEl.style.display = 'none';
    lcSetUiTag(true);
    lcSetStatus('✅ Server online — http://localhost:8000', false);
    return;
  }

  // Opened as a file:// — do an async probe
  lcSetStatus('Connecting to http://localhost:8000…', false);
  const online = await lcCheckServer();
  lcSetUiTag(online);

  if (online) {
    if (offEl) offEl.style.display = 'none';
    lcSetStatus('✅ Server online — http://localhost:8000', false);
  } else {
    // Keep iframe attempt visible behind overlay; show screenshot backdrop
    if (offEl) offEl.style.display = 'flex';
    lcSetStatus('⚠️ Server offline — open http://localhost:8000/demo instead', false);
  }
}

function formatNarration(text) {
  const agents = {
    'Project Manager':'agent-pm','Risk Analyst':'agent-risk',
    'QA Agent':'agent-qa','QA':'agent-qa','Engineer':'agent-eng','Stakeholder':'agent-stake',
  };
  let html = text;
  Object.entries(agents).forEach(([name,cls]) => {
    html = html.replaceAll(name, `<span class="agent ${cls}">${name}</span>`);
  });
  html = html.replace(/\b(CRITICAL|HIGH|COMPLETED|REJECTED|ESCALATION|ESCALATED|APPROVED)\b/g,
    '<span class="highlight">$1</span>');
  const sentences = html.split('. ').filter(Boolean);
  const chunks = [];
  for (let i=0; i<sentences.length; i+=2)
    chunks.push(sentences.slice(i,i+2).join('. ') + (i+2<sentences.length?'.':''));
  return chunks.map(c=>`<p>${c}</p>`).join('');
}

// ═══════════════════════════════════════════════════════════════════════
//  DOTS
// ═══════════════════════════════════════════════════════════════════════
function buildDots() {
  const container = document.getElementById('dotsEl');
  SLIDES.forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'dot'; d.title = `${i+1}. ${s.title}`;
    d.onclick = () => go(i);
    container.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function go(idx) {
  synth.cancel(); paused = false;
  // Stop live polling when leaving the live-platform slide
  if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; _liveRunning = false; }
  cur = Math.max(0, Math.min(SLIDES.length-1, idx));
  renderSlide(cur);
  document.getElementById('voiceStatus').textContent = `Slide ${cur+1} — click ▶ to speak`;
  document.getElementById('waveEl').classList.remove('speaking');
  if (playing) { speakCurrent(); }
}

// ═══════════════════════════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════════════════════════
function speakCurrent() {
  const s = SLIDES[cur];
  if (!s) { finish(); return; }
  const u = new SpeechSynthesisUtterance(s.narration);
  u.rate = rate; u.pitch = 1.02; u.volume = 1;
  if (selVoice) u.voice = selVoice;
  u.onstart = () => {
    document.getElementById('waveEl').classList.add('speaking');
    document.getElementById('voiceStatus').textContent = 'Speaking…';
    // Auto-trigger live demo when narration for slide 4 starts
    if (cur === 4) {
      setTimeout(() => {
        if (!_liveRunning) initLiveDemo();
      }, 2000);
    }
  };
  u.onend = () => {
    if (paused || !playing) return;
    document.getElementById('waveEl').classList.remove('speaking');
    cur++;
    if (cur < SLIDES.length) { renderSlide(cur); setTimeout(speakCurrent, 600); }
    else finish();
  };
  u.onerror = () => { cur++; if (cur < SLIDES.length) { renderSlide(cur); speakCurrent(); } };
  synth.speak(u);
}

function finish() {
  playing = false; paused = false; stopTick();
  document.getElementById('waveEl').classList.remove('speaking');
  document.getElementById('voiceStatus').textContent = '✅ Demo complete!';
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnStop').disabled = true;
}

// ═══════════════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════════════
function play() {
  if (paused) {
    paused = false; synth.resume(); playing = true;
    document.getElementById('waveEl').classList.add('speaking');
    document.getElementById('voiceStatus').textContent = 'Resumed';
    document.getElementById('btnPause').disabled = false;
    document.getElementById('btnPlay').disabled = true;
    return;
  }
  synth.cancel(); playing = true; paused = false;
  startTick();
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnPlay').disabled = true;
  speakCurrent();
}

function pause() {
  paused = true; playing = false; synth.pause();
  document.getElementById('waveEl').classList.remove('speaking');
  document.getElementById('voiceStatus').textContent = 'Paused';
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnPause').disabled = true;
}

function stopAll() {
  synth.cancel(); playing = false; paused = false; stopTick();
  if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; _liveRunning = false; }
  elapsed = 0; cur = 0;
  document.getElementById('hudTimer').textContent = '0:00';
  document.getElementById('hudTimer').classList.remove('running');
  document.getElementById('hudFill').style.width = '0%';
  document.getElementById('waveEl').classList.remove('speaking');
  document.getElementById('voiceStatus').textContent = 'Stopped — click ▶ to restart';
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnStop').disabled = true;
  renderSlide(0);
}

// ═══════════════════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════════════════
function startTick() {
  if (tick) return;
  tick = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed/60), s = elapsed%60;
    const el = document.getElementById('hudTimer');
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    el.classList.add('running');
    document.getElementById('hudFill').style.width = Math.min(elapsed/TOTAL*100,100)+'%';
  }, 1000);
}
function stopTick() { clearInterval(tick); tick = null; }

// ═══════════════════════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur+1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); go(cur-1); }
  if (e.key === 'p' || e.key === 'P') { playing ? pause() : play(); }
});

// ═══════════════════════════════════════════════════════════════════════
//  VOICE SETUP
// ═══════════════════════════════════════════════════════════════════════
function loadVoices() {
  const sel = document.getElementById('voiceSel');
  const vs  = synth.getVoices();
  sel.innerHTML = '';
  const pref = ['Google US English','Microsoft David','Microsoft Mark','Alex','Samantha'];
  const sorted = [
    ...pref.flatMap(n => vs.filter(v => v.name.includes(n))),
    ...vs.filter(v => v.lang.startsWith('en-') && !pref.some(p => v.name.includes(p))),
  ];
  sorted.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name; o.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(o);
  });
  selVoice = vs.find(v => v.name === sel.options[0]?.value);
  sel.onchange = () => selVoice = vs.find(v => v.name === sel.value);
}
synth.addEventListener('voiceschanged', loadVoices);
loadVoices();

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
buildDots();
renderSlide(0);
</script>
